name: Release Matrix Skeleton

on:
    workflow_dispatch:
        inputs:
            package_artifacts:
                description: "Build unsigned directory packages for the release matrix."
                required: true
                default: "false"
                type: choice
                options:
                    - "false"
                    - "true"
            run_packaged_smoke:
                description: "Run packaged sister smoke where the runner supports it."
                required: true
                default: "false"
                type: choice
                options:
                    - "false"
                    - "true"

permissions:
    contents: read

jobs:
    plan:
        name: Release matrix plan
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        steps:
            - name: Explain gate status
              run: |
                  echo "This workflow is a manual Gate D skeleton."
                  echo "It builds unsigned directory packages only when package_artifacts=true."
                  echo "Signing, notarization, Windows signing, fork-mode SDK verification, and hardware QA remain external gates."

    package-sister:
        name: Sister package (${{ matrix.target }})
        needs: plan
        if: ${{ inputs.package_artifacts == 'true' }}
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: darwin-arm64
                      runner: macos-14
                      python: "3.11"
                      electron_target: mac
                      package_dir: apps/sister/release/mac-arm64
                      smoke_supported: true
                    - target: darwin-x64
                      runner: macos-15-intel
                      python: "3.11"
                      electron_target: mac
                      package_dir: apps/sister/release/mac
                      smoke_supported: false
                    - target: win32-x64
                      runner: windows-2022
                      python: "3.11"
                      electron_target: win
                      package_dir: apps/sister/release/win-unpacked
                      smoke_supported: false
                    - target: linux-x64
                      runner: ubuntu-24.04
                      python: "3.11"
                      electron_target: linux
                      package_dir: apps/sister/release/linux-unpacked
                      smoke_supported: false
                    - target: linux-arm64
                      runner: ubuntu-24.04-arm
                      python: "3.11"
                      electron_target: linux
                      package_dir: apps/sister/release/linux-arm64-unpacked
                      smoke_supported: false

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python }}
                  cache: pip
                  cache-dependency-path: python-sidecar/pyproject.toml

            - name: Install Node dependencies
              run: npm ci

            - name: Install Python sidecar release dependencies
              shell: bash
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e "./python-sidecar[dev,ml]"

            - name: Build sister app
              run: npm -w @lyricue/sister run build

            - name: Build packaged sidecar
              shell: bash
              run: python python-sidecar/build.py

            - name: Package sister app directory
              working-directory: apps/sister
              shell: bash
              env:
                  LC_DEPLOYMENT_MODE: sister
              run: npx electron-builder --dir --${{ matrix.electron_target }}

            - name: Packaged sister smoke
              if: ${{ inputs.run_packaged_smoke == 'true' && matrix.smoke_supported == true }}
              shell: bash
              run: |
                  npm -w @lyricue/sister run smoke:packaged -- \
                    --output-dir "docs/qa-reports/evidence/release-matrix-${{ matrix.target }}" \
                    --timeout-ms 300000

            - name: Upload package artifact
              uses: actions/upload-artifact@v4
              with:
                  name: lyricue-sister-${{ matrix.target }}-unsigned-dir
                  path: ${{ matrix.package_dir }}
                  if-no-files-found: error

            - name: Upload packaged smoke evidence
              if: ${{ inputs.run_packaged_smoke == 'true' && matrix.smoke_supported == true }}
              uses: actions/upload-artifact@v4
              with:
                  name: lyricue-sister-${{ matrix.target }}-smoke-evidence
                  path: docs/qa-reports/evidence/release-matrix-${{ matrix.target }}
                  if-no-files-found: error
