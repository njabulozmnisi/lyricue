name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    local-quality-gate:
        name: Local quality gate
        runs-on: macos-14
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: python-sidecar/pyproject.toml

            - name: Install Node dependencies
              run: npm ci

            - name: Install Python sidecar dependencies
              run: |
                  cd python-sidecar
                  python -m venv .venv
                  . .venv/bin/activate
                  python -m pip install --upgrade pip
                  python -m pip install -e ".[dev]"

            - name: TypeScript composite build
              run: npx tsc -b --pretty false

            - name: TypeScript tests
              run: npm run test:ts

            - name: Python sidecar tests
              run: |
                  cd python-sidecar
                  . .venv/bin/activate
                  pytest -q

            - name: Sister karaoke renderer build
              run: |
                  cd apps/sister
                  npx vite build --config vite.config.mjs

            - name: Sister operator renderer build
              run: |
                  cd apps/sister
                  npx vite build --config vite.config.operator.mjs
