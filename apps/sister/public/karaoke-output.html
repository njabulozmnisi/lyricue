<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!--
            Content Security Policy — closes M1-close D12.

            The renderer loads only local resources:
              - one local script (the bundled IIFE)
              - one local stylesheet (the bundled CSS)
              - inline `style=` attributes on each .word span for --progress + color
                custom properties (per architecture.md §4.9 — the GPU-composited sweep
                requires inline style updates; this is the documented pattern).

            It makes no network calls, loads no fonts, no images, no XHR, no WebSocket.
            `connect-src 'none'` makes that explicit so a stray import can't silently
            phone home. `'unsafe-inline'` on style-src is the minimum-permission set
            that still allows the inline-style attributes the renderer needs.

            Without this CSP, Electron emits an "Insecure Content-Security-Policy"
            warning to the renderer console on every boot.
        -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; base-uri 'self'; form-action 'none'; object-src 'none';"
        />
        <title>LyriCue · Karaoke Output</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                background: black;
                color: white;
                overflow: hidden;
            }
            #root {
                height: 100%;
                width: 100%;
            }
        </style>
        <link rel="stylesheet" href="./build/karaoke-output.bundle.css" />
    </head>
    <body>
        <div id="root"></div>
        <script src="./build/karaoke-output.bundle.js"></script>
    </body>
</html>
